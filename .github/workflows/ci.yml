name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Run unit tests
        run: pytest -q
      - name: Compile check
        run: python -m py_compile src/loginvrcast/**/*.py

  build-variant-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate build scripts set expected feature flags
        run: |
          grep -q 'LOGINVRCAST_WIFI_ENABLED=0' scripts/build_usb_only.sh
          grep -q 'LOGINVRCAST_WIFI_ENABLED=1' scripts/build_usb_wifi.sh
