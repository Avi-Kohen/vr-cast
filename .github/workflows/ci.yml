name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Run unit tests
        run: pytest -q
      - name: Compile check
        run: python -m py_compile src/loginvrcast/**/*.py

  build-variant-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate build scripts and runtime hook wiring
        run: |
          test -f scripts/build_windows_x64.ps1
          test -f scripts/build_windows_x64.sh
          grep -q 'pyi_runtime_wifi_off.py' scripts/build_usb_only.sh
          grep -q 'pyi_runtime_wifi_on.py' scripts/build_usb_wifi.sh
          grep -q 'pyi_runtime_wifi_off.py' scripts/build_windows_x64.ps1
          grep -q 'pyi_runtime_wifi_on.py' scripts/build_windows_x64.ps1


  macos-arm64-artifacts:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller
      - name: Build macOS arm64 USB and USB+Wi-Fi apps
        run: ./scripts/build_macos_arm64.sh
      - name: Archive app bundles
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/LoginVRCast-USB.app dist/LoginVRCast-USB-macos-arm64.zip
          ditto -c -k --sequesterRsrc --keepParent dist/LoginVRCast-USB-WIFI.app dist/LoginVRCast-USB-WIFI-macos-arm64.zip
      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loginvrcast-macos-arm64
          path: |
            dist/LoginVRCast-USB-macos-arm64.zip
            dist/LoginVRCast-USB-WIFI-macos-arm64.zip

  windows-x64-artifacts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller
      - name: Build Windows x64 USB and USB+Wi-Fi onefile apps
        shell: pwsh
        run: ./scripts/build_windows_x64.ps1 -OneFile
      - name: Archive Windows executables
        shell: pwsh
        run: |
          Compress-Archive -Path dist/LoginVRCast-USB-onefile.exe -DestinationPath dist/LoginVRCast-USB-onefile-windows-x64.zip -Force
          Compress-Archive -Path dist/LoginVRCast-USB-WIFI-onefile.exe -DestinationPath dist/LoginVRCast-USB-WIFI-onefile-windows-x64.zip -Force
      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loginvrcast-windows-x64
          path: |
            dist/LoginVRCast-USB-onefile-windows-x64.zip
            dist/LoginVRCast-USB-WIFI-onefile-windows-x64.zip
