name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing git tag to publish (example: v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-arm64-release:
    runs-on: macos-14
    env:
      MACOS_CERT_B64: ${{ secrets.MACOS_CERT_B64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          fetch-depth: 0

      - name: Validate release tag exists
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git rev-parse --verify "refs/tags/${{ inputs.release_tag }}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build app bundles (USB + USB-WIFI)
        run: ./scripts/build_macos_arm64.sh

      - name: Optional code signing (if secrets are configured)
        if: ${{ env.MACOS_CERT_B64 != '' && env.MACOS_CERT_PASSWORD != '' && env.MACOS_SIGN_IDENTITY != '' }}
        run: |
          echo "$MACOS_CERT_B64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          codesign --deep --force --options runtime --sign "$MACOS_SIGN_IDENTITY" dist/LoginVRCast-USB.app
          codesign --deep --force --options runtime --sign "$MACOS_SIGN_IDENTITY" dist/LoginVRCast-USB-WIFI.app

      - name: Optional notarization (if Apple credentials are configured)
        if: ${{ env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/LoginVRCast-USB.app dist/LoginVRCast-USB.app.zip
          ditto -c -k --sequesterRsrc --keepParent dist/LoginVRCast-USB-WIFI.app dist/LoginVRCast-USB-WIFI.app.zip
          xcrun notarytool submit dist/LoginVRCast-USB.app.zip --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun notarytool submit dist/LoginVRCast-USB-WIFI.app.zip --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple dist/LoginVRCast-USB.app
          xcrun stapler staple dist/LoginVRCast-USB-WIFI.app

      - name: Package release artifacts
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/LoginVRCast-USB.app dist/LoginVRCast-USB-macos-arm64.zip
          ditto -c -k --sequesterRsrc --keepParent dist/LoginVRCast-USB-WIFI.app dist/LoginVRCast-USB-WIFI-macos-arm64.zip

      - name: Publish GitHub Release assets (macOS)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LoginVRCast-USB-macos-arm64.zip
            dist/LoginVRCast-USB-WIFI-macos-arm64.zip
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true

  windows-x64-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          fetch-depth: 0

      - name: Validate release tag exists
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: git rev-parse --verify "refs/tags/${{ inputs.release_tag }}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build app binaries (USB + USB-WIFI onefile)
        shell: pwsh
        run: ./scripts/build_windows_x64.ps1 -OneFile

      - name: Package release artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path dist/LoginVRCast-USB-onefile.exe -DestinationPath dist/LoginVRCast-USB-windows-x64.zip -Force
          Compress-Archive -Path dist/LoginVRCast-USB-WIFI-onefile.exe -DestinationPath dist/LoginVRCast-USB-WIFI-windows-x64.zip -Force

      - name: Publish GitHub Release assets (Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            dist/LoginVRCast-USB-windows-x64.zip
            dist/LoginVRCast-USB-WIFI-windows-x64.zip
